name: Actualizar marcador quiniela

# Cuándo corre:
on:
  schedule:
    # Cron en UTC. CDMX = UTC-6. Corremos cada 30 min entre 16:00 y 06:00 UTC
    # (= 10:00 a 00:00 hora CDMX), que cubre todos los horarios de partido.
    - cron: "0,30 16-23 * * *"
    - cron: "0,30 0-6 * * *"
  workflow_dispatch:   # botón para correrlo manual desde la pestaña Actions

# Permiso para que el Action pueda hacer commit del index.html actualizado
permissions:
  contents: write

# Evita que dos corridas se encimen
concurrency:
  group: marcador
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerar marcador
        run: python update.py

      - name: Commit si hubo cambios
        run: |
          git config user.name  "marcador-bot"
          git config user.email "actions@github.com"
          if [[ -z "$(git status --porcelain index.html)" ]]; then
            echo "Sin cambios en el marcador."
            exit 0
          fi
          git add index.html
          git commit -m "Marcador actualizado: $(date -u '+%Y-%m-%d %H:%M UTC')"
          # Push con reintentos: si otra corrida pusheó primero, integra y reintenta.
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Marcador publicado en el intento $i."
              exit 0
            fi
            echo "Push rechazado (intento $i). Integrando cambios remotos..."
            git fetch origin main
            git rebase --autostash origin/main || git rebase --abort
            sleep 5
          done
          echo "ERROR: no se pudo publicar tras 5 intentos."
          exit 1
